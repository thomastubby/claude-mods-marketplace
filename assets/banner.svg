<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F9FAFB"/>
      <stop offset="100%" style="stop-color:#E5E7EB"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#F59E0B" stroke-width="0.5" fill="none">
    <line x1="0" y1="40" x2="1280" y2="40"/>
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="160" y1="0" x2="160" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
    <line x1="1120" y1="0" x2="1120" y2="320"/>
  </g>

  <!-- Floating mod cards in background -->
  <!-- Card 1 -->
  <g transform="translate(50, 40)" opacity="0.12">
    <rect width="140" height="80" rx="8" fill="#F59E0B"/>
    <rect x="12" y="12" width="60" height="6" rx="3" fill="white"/>
    <rect x="12" y="24" width="100" height="4" rx="2" fill="white" opacity="0.6"/>
    <rect x="12" y="34" width="80" height="4" rx="2" fill="white" opacity="0.4"/>
    <rect x="12" y="52" width="40" height="16" rx="4" fill="white" opacity="0.5"/>
  </g>
  <!-- Card 2 -->
  <g transform="translate(1060, 60)" opacity="0.1">
    <rect width="160" height="90" rx="8" fill="#F59E0B"/>
    <rect x="12" y="12" width="70" height="6" rx="3" fill="white"/>
    <rect x="12" y="24" width="120" height="4" rx="2" fill="white" opacity="0.6"/>
    <rect x="12" y="34" width="90" height="4" rx="2" fill="white" opacity="0.4"/>
    <rect x="12" y="56" width="44" height="16" rx="4" fill="white" opacity="0.5"/>
  </g>
  <!-- Card 3 -->
  <g transform="translate(100, 200)" opacity="0.08">
    <rect width="120" height="70" rx="8" fill="#F59E0B"/>
    <rect x="10" y="10" width="50" height="5" rx="2.5" fill="white"/>
    <rect x="10" y="20" width="80" height="3" rx="1.5" fill="white" opacity="0.6"/>
    <rect x="10" y="28" width="60" height="3" rx="1.5" fill="white" opacity="0.4"/>
  </g>
  <!-- Card 4 -->
  <g transform="translate(1080, 200)" opacity="0.08">
    <rect width="130" height="75" rx="8" fill="#F59E0B"/>
    <rect x="10" y="10" width="55" height="5" rx="2.5" fill="white"/>
    <rect x="10" y="20" width="90" height="3" rx="1.5" fill="white" opacity="0.6"/>
    <rect x="10" y="28" width="70" height="3" rx="1.5" fill="white" opacity="0.4"/>
  </g>

  <!-- Glowing orbs -->
  <circle cx="200" cy="160" r="120" fill="#F59E0B" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="1080" cy="160" r="120" fill="#D97706" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Logo icon -->
  <g transform="translate(440, 100)">
    <g filter="url(#glow)">
      <!-- Puzzle piece -->
      <rect x="-18" y="-18" width="36" height="36" rx="5" fill="url(#accentGrad)"/>
      <rect x="-7" y="-28" width="14" height="14" rx="4" fill="url(#accentGrad)"/>
      <rect x="14" y="-7" width="14" height="14" rx="4" fill="url(#accentGrad)"/>
      <rect x="-7" y="14" width="14" height="14" rx="4" fill="url(#accentGrad)"/>
      <rect x="-28" y="-7" width="14" height="14" rx="4" fill="url(#accentGrad)"/>
      <!-- Inner plus -->
      <rect x="-2" y="-9" width="4" height="18" rx="2" fill="white" opacity="0.5"/>
      <rect x="-9" y="-2" width="18" height="4" rx="2" fill="white" opacity="0.5"/>
    </g>
  </g>

  <!-- Main title -->
  <text x="500" y="118" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="url(#textGrad)" letter-spacing="-1">Claude Mods</text>

  <!-- Subtitle -->
  <text x="440" y="160" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#9CA3AF" letter-spacing="0.5">Community-powered customizations for Claude Desktop</text>

  <!-- Category pills -->
  <g transform="translate(440, 190)">
    <rect x="0" y="0" width="70" height="26" rx="13" fill="#D97706" opacity="0.2" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="35" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="600">Skills</text>

    <rect x="82" y="0" width="68" height="26" rx="13" fill="#D97706" opacity="0.2" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="116" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="600">Styles</text>

    <rect x="162" y="0" width="82" height="26" rx="13" fill="#D97706" opacity="0.2" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="203" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="600">Prompts</text>

    <rect x="256" y="0" width="74" height="26" rx="13" fill="#D97706" opacity="0.2" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="293" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="600">Modes</text>

    <rect x="342" y="0" width="74" height="26" rx="13" fill="#D97706" opacity="0.2" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="379" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="600">Agents</text>

    <rect x="428" y="0" width="68" height="26" rx="13" fill="#D97706" opacity="0.2" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="462" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="600">Hooks</text>
  </g>

  <!-- Accent line at bottom -->
  <rect y="312" width="1280" height="8" fill="url(#accentGrad)"/>
</svg>