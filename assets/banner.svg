<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="350" cy="160" rx="400" ry="250" fill="url(#glow1)"/>
  <ellipse cx="950" cy="160" rx="350" ry="200" fill="url(#glow2)"/>

  <!-- Thin top line -->
  <rect y="0" width="1280" height="1" fill="url(#accent)" opacity="0.3"/>

  <!-- Logo mark -->
  <g transform="translate(460, 112)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
    <!-- Inner hexagon shape -->
    <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="url(#accent)" opacity="0.15"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="url(#accent)"/>
    <!-- Radiating lines -->
    <line x1="0" y1="-8" x2="0" y2="-18" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="7" y1="-4" x2="15" y2="-9" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="7" y1="4" x2="15" y2="9" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="8" x2="0" y2="18" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-7" y1="4" x2="-15" y2="9" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-7" y1="-4" x2="-15" y2="-9" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="505" y="122" font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="white" letter-spacing="-1.5">claude mods</text>

  <!-- Subtitle -->
  <text x="462" y="158" font-family="'SF Pro Text', 'Inter', system-ui, sans-serif" font-size="16" fill="#737373" letter-spacing="0.3">Customize your Claude experience with community-built mods</text>

  <!-- Pill tags -->
  <g transform="translate(462, 185)">
    <rect width="62" height="24" rx="12" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="31" y="16" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="10" fill="#a3a3a3" text-anchor="middle">skills</text>

    <rect x="72" width="58" height="24" rx="12" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="101" y="16" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="10" fill="#a3a3a3" text-anchor="middle">styles</text>

    <rect x="140" width="74" height="24" rx="12" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="177" y="16" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="10" fill="#a3a3a3" text-anchor="middle">prompts</text>

    <rect x="224" width="66" height="24" rx="12" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="257" y="16" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="10" fill="#a3a3a3" text-anchor="middle">modes</text>

    <rect x="300" width="82" height="24" rx="12" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="341" y="16" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="10" fill="#a3a3a3" text-anchor="middle">modpacks</text>
  </g>

  <!-- Terminal preview snippet -->
  <g transform="translate(462, 230)">
    <rect width="356" height="60" rx="8" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06" stroke-width="0.5"/>
    <text x="16" y="24" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="12" fill="#737373">$</text>
    <text x="28" y="24" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="12" fill="#e5e5e5"> /mods install no-yapping</text>
    <text x="16" y="45" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="11" fill="#a78bfa">Installed "No Yapping" - restart to activate</text>
  </g>

  <!-- Bottom accent line -->
  <rect y="318" width="1280" height="2" fill="url(#accent)" opacity="0.4"/>
</svg>