<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#FDE68A;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#FDE68A;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="112" height="112" rx="24" ry="24" fill="url(#bg)"/>
  <rect x="4" y="4" width="112" height="112" rx="24" ry="24" fill="url(#shine)"/>
  <!-- Puzzle piece / mod icon -->
  <g transform="translate(60,60)">
    <!-- Center block -->
    <rect x="-18" y="-18" width="36" height="36" rx="4" fill="white" opacity="0.95"/>
    <!-- Top tab -->
    <rect x="-7" y="-30" width="14" height="16" rx="4" fill="white" opacity="0.95"/>
    <!-- Right tab -->
    <rect x="14" y="-7" width="16" height="14" rx="4" fill="white" opacity="0.95"/>
    <!-- Bottom tab -->
    <rect x="-7" y="14" width="14" height="16" rx="4" fill="white" opacity="0.95"/>
    <!-- Left tab -->
    <rect x="-30" y="-7" width="16" height="14" rx="4" fill="white" opacity="0.95"/>
    <!-- Inner detail - plus sign -->
    <rect x="-2" y="-10" width="4" height="20" rx="2" fill="#D97706" opacity="0.6"/>
    <rect x="-10" y="-2" width="20" height="4" rx="2" fill="#D97706" opacity="0.6"/>
  </g>
</svg>