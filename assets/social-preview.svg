<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="spBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="spAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="spGlow1" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spGlow2" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#spBg)"/>

  <!-- Ambient glows -->
  <ellipse cx="640" cy="260" rx="500" ry="300" fill="url(#spGlow1)"/>
  <ellipse cx="640" cy="400" rx="400" ry="250" fill="url(#spGlow2)"/>

  <!-- Top line -->
  <rect y="0" width="1280" height="1" fill="url(#spAccent)" opacity="0.2"/>

  <!-- Logo mark -->
  <g transform="translate(640, 220)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#spAccent)" stroke-width="2.5" opacity="0.5"/>
    <polygon points="0,-24 21,-12 21,12 0,24 -21,12 -21,-12" fill="url(#spAccent)" opacity="0.12"/>
    <circle cx="0" cy="0" r="8" fill="url(#spAccent)"/>
    <line x1="0" y1="-12" x2="0" y2="-28" stroke="#c084fc" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="10" y1="-6" x2="24" y2="-14" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="10" y1="6" x2="24" y2="14" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="12" x2="0" y2="28" stroke="#c084fc" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-10" y1="6" x2="-24" y2="14" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-10" y1="-6" x2="-24" y2="-14" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="640" y="320" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="56" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-2">claude mods</text>

  <!-- Subtitle -->
  <text x="640" y="360" font-family="'SF Pro Text', 'Inter', system-ui, sans-serif" font-size="20" fill="#737373" text-anchor="middle">Community-built mods for Claude Desktop</text>

  <!-- Pill tags -->
  <g transform="translate(640, 400)">
    <rect x="-210" width="62" height="28" rx="14" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="-179" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#a3a3a3" text-anchor="middle">skills</text>

    <rect x="-138" width="58" height="28" rx="14" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="-109" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#a3a3a3" text-anchor="middle">styles</text>

    <rect x="-70" width="74" height="28" rx="14" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="-33" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#a3a3a3" text-anchor="middle">prompts</text>

    <rect x="14" width="66" height="28" rx="14" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="47" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#a3a3a3" text-anchor="middle">modes</text>

    <rect x="90" width="82" height="28" rx="14" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="131" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#a3a3a3" text-anchor="middle">modpacks</text>
  </g>

  <!-- Stats -->
  <text x="640" y="490" font-family="'SF Pro Text', 'Inter', system-ui, sans-serif" font-size="15" fill="#525252" text-anchor="middle">24 mods  /  7 categories  /  open source</text>

  <!-- Bottom line -->
  <rect y="638" width="1280" height="2" fill="url(#spAccent)" opacity="0.3"/>
</svg>